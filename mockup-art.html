<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Album Art Mockup</title>
  <style>
    :root {
      --bg:     #0a0a0a;
      --card:   #1a1a1a;
      --card2:  #252525;
      --accent: #17a2b8;
      --text:   #f5f5f5;
      --dim:    #7a7a7a;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin: 0 0 6px;
    }
    .note {
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .loading { color: var(--dim); font-size: 13px; margin: 8px 0; }

    /* ── CARD ── */
    .card {
      background: transparent;
      border-radius: 0;
      padding: 10px 14px;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e1e;
    }
    .card:last-child { border-bottom: none; }
    .card-bordered {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border) !important;
      margin-bottom: 8px;
    }

    /* Art / fallback icon slot */
    .thumb {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: var(--card2);
      flex-shrink: 0;
      object-fit: cover;
    }
    .thumb-fallback {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: var(--card2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    /* Body */
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #2596D6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-artist {
      font-size: 13px;
      color: var(--dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-size: 12px;
      color: var(--dim);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot { color: var(--border); }

    /* Edit icon */
    .edit-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #ffffff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div style="background:rgba(10,10,10,0.97);position:sticky;top:0;z-index:10;padding:10px 0 8px;margin:-16px -16px 12px;padding-left:16px;padding-right:16px;">
  <div style="font-size:18px;font-weight:800;letter-spacing:1px;color:#17a2b8;text-transform:uppercase;margin-bottom:10px;">🎵 MY MUSIC LIBRARY</div>
  <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;">
    <button style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:#17a2b8;color:#fff;font-size:13px;font-weight:700;font-family:inherit;">All</button>
    <button style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:#252525;color:#7a7a7a;font-size:13px;font-weight:700;font-family:inherit;">New</button>
    <button style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:#252525;color:#7a7a7a;font-size:13px;font-weight:700;font-family:inherit;">Favorites</button>
    <button style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:#252525;color:#7a7a7a;font-size:13px;font-weight:700;font-family:inherit;">Playlist</button>
    <button style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:#252525;color:#7a7a7a;font-size:13px;font-weight:700;font-family:inherit;">Sleep</button>
  </div>
</div>

<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#17a2b8;text-transform:uppercase;margin-bottom:8px;">A — No Border</div>
<div id="cards-no-border"><p class="loading">Fetching album art…</p></div>

<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#17a2b8;text-transform:uppercase;margin:20px 0 8px;">B — With Border</div>
<div id="cards-border"></div>

<script>
const SAMPLES = [
  { search: 'Billie Eilish HIT ME HARD AND SOFT', stars: 5, type: 'album', topArtist: true },
  { search: 'Orville Peck Appaloosa', stars: 5, type: 'album', topArtist: false },
  { search: 'Cigarettes After Sex X\'s', stars: 5, type: 'album', topArtist: true },
  { search: 'Tom Odell A Wonderful Life', stars: 5, type: 'album', topArtist: false },
  // Playlist fallback — no art
  { search: null, title: 'Classic Rock | Top 100 Songs', artist: 'Various', year: null, stars: 4, type: 'playlist', topArtist: false },
];

function starsHtml(n) {
  let s = '';
  for (let i = 0; i < 5; i++) {
    s += `<span style="color:${i < n ? '#7a7a7a' : '#3a3a3c'}">${i < n ? '★' : '☆'}</span>`;
  }
  return s;
}

async function fetchArt(term) {
  const url = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=1`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      const r = data.results[0];
      return {
        art: r.artworkUrl100.replace('100x100bb', '300x300bb'),
        title: r.collectionName,
        artist: r.artistName,
        year: new Date(r.releaseDate).getFullYear(),
      };
    }
  } catch(e) {}
  return null;
}

const TYPE_ICON = { album: '💿', playlist: '📋', single: '🎵', holiday: '🎄' };

async function build() {
  const results = await Promise.all(SAMPLES.map(s => s.search ? fetchArt(s.search) : Promise.resolve(null)));

  let html = '';
  results.forEach((r, i) => {
    const s = SAMPLES[i];
    const title  = r ? r.title  : s.title;
    const artist = r ? r.artist : s.artist;
    const year   = r ? r.year   : s.year;

    const artHtml = r
      ? `<img class="thumb" src="${r.art}" alt="">`
      : `<div class="thumb-fallback">${TYPE_ICON[s.type] || '🎵'}</div>`;

    const metaHtml = year
      ? `${year} <span class="dot">·</span> ${starsHtml(s.stars)}`
      : starsHtml(s.stars);

    const topStar = s.topArtist
      ? ` <span style="color:#17a2b8;opacity:0.8;font-size:12px;">★</span>`
      : '';

    html += `
      <div class="card">
        ${artHtml}
        <div class="card-body">
          <div class="card-title">${title}</div>
          <div class="card-artist">${artist}${topStar}</div>
          <div class="card-meta">${metaHtml}</div>
        </div>
        <div class="edit-btn">✎</div>
      </div>`;
  });

  document.getElementById('cards-no-border').innerHTML = html;
  document.getElementById('cards-border').innerHTML = html.replace(/class="card"/g, 'class="card card-bordered"');
}

build();
</script>
</body>
</html>
