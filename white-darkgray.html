<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>White Text + Dark Gray Stars</title>
  <style>
    :root {
      --bg:     #0a0a0a;
      --card:   #1a1a1a;
      --card2:  #252525;
      --accent: #17a2b8;
      --text:   #f5f5f5;
      --dim:    #7a7a7a;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding: 16px;
    }
    h1 { font-size: 18px; margin-bottom: 24px; color: var(--dim); }

    .sub-section-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #f5f5f5;
      text-transform: uppercase;
      margin: 0;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      background: transparent;
      border-radius: 0;
      border-top: 1px solid var(--border);
      cursor: pointer;
    }

    .stars { letter-spacing: 2px; font-size: 15px; color: #4a4a4c; }
    .stars-outline { color: #2a2a2c; }

    .top-badge {
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: auto;
      color: #7a7a7a;
    }
  </style>
</head>
<body>

<h1>White Text + Dark Gray Stars</h1>

<div class="sub-section-label">
  › FIVE (5) <span class="stars">★ ★ ★ ★ ★</span>
</div>

<div class="sub-section-label" style="display:flex;align-items:center;gap:8px">
  › BILLIE EILISH <span class="top-badge">★ TOP ARTIST</span>
</div>

<div class="sub-section-label">
  › FOUR (4) <span class="stars">★ ★ ★ ★ <span class="stars-outline">☆</span></span>
</div>

<div class="sub-section-label">
  › THREE (3) <span class="stars">★ ★ ★ <span class="stars-outline">☆ ☆</span></span>
</div>

<div class="sub-section-label" style="display:flex;align-items:center;gap:8px">
  › TOM ODELL <span class="top-badge">★ TOP ARTIST</span>
</div>

</body>
</html>
