<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Option 7 Preview</title>
  <style>
    :root {
      --bg:     #0a0a0a;
      --card:   #1a1a1a;
      --card2:  #252525;
      --accent: #17a2b8;
      --text:   #f5f5f5;
      --dim:    #7a7a7a;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding: 16px;
    }

    .sub-section-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #9a9a9c;
      text-transform: uppercase;
      margin: 0;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      background: transparent;
      border-radius: 0;
      border-top: 1px solid var(--border);
      cursor: pointer;
    }

    .card {
      background: transparent;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e1e;
    }
    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: var(--card2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #2596D6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-artist {
      font-size: 13px;
      color: var(--text);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-size: 12px;
      color: var(--dim);
      margin-top: 3px;
    }
    .stars { letter-spacing: 2px; font-size: 15px; color: #17a2b8; }
    .stars-outline { color: #3a3a3c; }

    h1 { font-size: 16px; margin-bottom: 20px; color: var(--dim); text-transform: uppercase; }
  </style>
</head>
<body>

<h1>Option 7: Medium Gray Text + Teal Stars</h1>

<div class="sub-section-label">
  › FIVE (5) <span class="stars">★ ★ ★ ★ ★</span>
</div>
<div class="card">
  <div class="card-icon">💿</div>
  <div class="card-body">
    <div class="card-title">HIT ME HARD AND SOFT</div>
    <div class="card-artist">Billie Eilish</div>
    <div class="card-meta">2024 · <span class="stars">★ ★ ★ ★ ★</span></div>
  </div>
</div>

<div class="card">
  <div class="card-icon">💿</div>
  <div class="card-body">
    <div class="card-title">A Wonderful Life</div>
    <div class="card-artist">Tom Odell</div>
    <div class="card-meta">2025 · <span class="stars">★ ★ ★ ★ ★</span></div>
  </div>
</div>

<div class="sub-section-label">
  › FOUR (4) <span class="stars">★ ★ ★ ★ <span class="stars-outline">☆</span></span>
</div>
<div class="card">
  <div class="card-icon">💿</div>
  <div class="card-body">
    <div class="card-title">Duets</div>
    <div class="card-artist">Barbra Streisand</div>
    <div class="card-meta">2002 · <span class="stars">★ ★ ★ ★ <span class="stars-outline">☆</span></span></div>
  </div>
</div>

<div class="sub-section-label">
  › THREE (3) <span class="stars">★ ★ ★ <span class="stars-outline">☆ ☆</span></span>
</div>
<div class="card">
  <div class="card-icon">💿</div>
  <div class="card-body">
    <div class="card-title">Some Album</div>
    <div class="card-artist">Some Artist</div>
    <div class="card-meta">2023 · <span class="stars">★ ★ ★ <span class="stars-outline">☆ ☆</span></span></div>
  </div>
</div>

</body>
</html>
